name: merge gate
run-name: gating

# The gate every PR must pass before it may land. `main`'s ruleset requires this check
# AND that the branch be up to date with `main`, so the run that gates a merge is a run
# on this branch already rebased onto the `main` it lands on.
on:
    pull_request:

jobs:
    suite:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            # The real manifest, not a hand-picked subset of it. Both desks install this
            # themselves on a pull that moves it (update.py), so a manifest that cannot
            # install is a launch that dies on his desk — found here instead of there.
            - name: Install what the manifest says the app needs
              run: pip install -e ".[dev]"

            - name: The suite
              run: python -m pytest -q
